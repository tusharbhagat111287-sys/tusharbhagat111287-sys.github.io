
<!DOCTYPE HTML>
<html>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no'>
  <meta name='mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <meta name='theme-color' content='#2b1b0e'>
  <title>Sarvopari Dham Online</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{font-family:'Segoe UI', sans-serif; background:radial-gradient(circle at center, #2b1b0e 0%, #0a0a0a 100%); color:#f0e6d2; margin:0; text-align:center; min-height:100vh; padding-bottom:70px;}
    .nav{background:rgba(20, 20, 20, 0.9); padding:10px; display:flex; justify-content:space-around; font-weight:bold; border-bottom: 2px solid #c8963e;}
    .nav a{color:#a9a9a9; text-decoration:none; padding:6px 15px; border-radius:20px; transition:0.3s; cursor:pointer;}
    .nav a.act{background:linear-gradient(145deg, #c8963e, #8b6914); color:#000;}
    
    #dashboard { display: block; }
    h2{margin:20px 0 10px; color:#e6c27a; font-size:18px;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; max-width:800px; margin:auto;}
    .card{background:linear-gradient(145deg, rgba(40,30,20,0.8), rgba(20,15,10,0.9)); padding:15px; border-radius:10px; border:1px solid rgba(200,150,62,0.3);}
    h4{margin:0 0 10px; color:#f9d976; font-size:13px;}
    .btn{border:none; padding:12px 0; width:100%; border-radius:20px; font-weight:bold; cursor:pointer; color:#fff; font-size:14px; transition:0.3s; box-shadow:0 3px 5px rgba(0,0,0,0.4);}
    .on-m{background:#388E3C; box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);}
    .off-m{background:#D32F2F;}
    
    #settings { display: none; text-align: left; }
    .tabs{display:flex; overflow-x:auto; padding:10px; gap:8px; background:rgba(0,0,0,0.5);}
    .tb{background:#2a2a2a; color:#c8963e; border:1px solid #c8963e; padding:6px 12px; border-radius:15px; white-space:nowrap; font-weight:bold; font-size:13px; cursor:pointer;}
    .tb.act{background:#c8963e; color:#000;}
    .tc{display:none; padding:10px; max-width:800px; margin:auto;} 
    .tc.act{display:block;}
    .cd{background:linear-gradient(145deg, rgba(40,30,20,0.8), rgba(20,15,10,0.9)); padding:8px 10px; margin-bottom:10px; border-radius:8px; border-left:4px solid transparent; box-shadow:0 2px 5px rgba(0,0,0,0.5);}
    .hd{display:flex; justify-content:space-between; margin-bottom:6px; font-weight:bold; font-size:13px;}
    .rw{display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.4); padding:5px 8px; margin-bottom:4px; border-radius:5px; font-size:12px;}
    input,select{background:#111; color:#f0e6d2; border:1px solid #c8963e; padding:3px; border-radius:4px; text-align:center; font-weight:bold; font-size:12px;}
    .sw{position:relative; width:36px; height:18px;} .sw input{display:none;} .sw span{position:absolute; top:0; left:0; right:0; bottom:0; background:#444; border-radius:18px; cursor:pointer;} .sw span:before{content:''; position:absolute; width:14px; height:14px; left:2px; bottom:2px; background:#fff; border-radius:50%; transition:0.3s;} input:checked+span{background:#c8963e;} input:checked+span:before{transform:translateX(18px); background:#000;}
    .btn-save{position:fixed; bottom:0; left:0; width:100%; background:linear-gradient(145deg, #c8963e, #8b6914); color:#000; border:none; padding:15px; font-size:15px; font-weight:bold; cursor:pointer; text-transform:uppercase; z-index:100;}
    
    #toast{visibility:hidden; min-width:250px; background:linear-gradient(145deg, #4CAF50, #2E7D32); color:#fff; text-align:center; border-radius:30px; padding:12px; position:fixed; z-index:1000; left:50%; bottom:70px; transform:translateX(-50%); font-size:14px; font-weight:bold; border:1px solid #8BC34A;} 
    #toast.show{visibility:visible;}
    .footer{text-align:center; color:#ffffff; font-size:18px; margin-top:30px; padding-bottom:30px; font-weight:bold; letter-spacing:1px; text-shadow: 0 0 8px #ff00ff, 0 0 15px #ff00ff;}
  </style>
</head>
<body>
  
  <div class='nav'>
    <a id="navDash" class='act' onclick="switchTab('dash')">DASHBOARD</a>
    <a id="navSet" onclick="switchTab('set')">SETTINGS</a>
  </div>
  
  <div id='toast'>Settings Sent to ESP32 Master!</div>

  <div id="dashboard">
    <h2 style="text-align:center;">🔴🙏 SARVOPARI DHAM 🙏🔴</h2>
    <div class='grid' id='buttonsGrid'></div>
    <div class='footer'>GLOBAL LIGHT REMOTE</div>
  </div>

  <div id="settings">
    <div class='tabs' id='settingsTabs'></div>
    <div id='settingsContent'></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAoPnrydmBiFCG8FP52Sy_jsRBb1CyUfaM",
      databaseURL: "https://sarvopari-liths-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const names = ["1. Sinhasan Jalar 1", "2. Sabha Jalar 2", "3. Sabha Jalar 3", "4. Zumar 1", "5. Zumar 2", "6. Zumar 3", "7. Ghumat", "8. Border", "9. Audience Lamp 2", "10. Vakta Light"];
    const slotNames = ["S1: All Day 1", "S2: All Day 2", "S3: Mon-Sat 1", "S4: Mon-Sat 2", "S5: Mon-Sat 3", "S6: Mon-Sat 4", "S7: Tue Only 1", "S8: Tue Only 2", "S9: Sat Only 1", "S10: Sat Only 2", "S11: Sun Only 1", "S12: Sun Only 2"];
    const slotColors = ["#4CAF50", "#8BC34A", "#9C27B0", "#BA68C8", "#E91E63", "#F06292", "#FFEB3B", "#FBC02D", "#FF9800", "#F57C00", "#FFFFFF", "#E0E0E0"];
    
    let relayStates = {};

    function switchTab(tab) {
      if(tab === 'dash') {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('settings').style.display = 'none';
        document.getElementById('navDash').classList.add('act');
        document.getElementById('navSet').classList.remove('act');
      } else {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('settings').style.display = 'block';
        document.getElementById('navDash').classList.remove('act');
        document.getElementById('navSet').classList.add('act');
      }
    }

    function toggleRelay(id) {
      let currentState = relayStates["R"+id] || false;
      db.ref('/relays/R' + id).set(!currentState);
    }

    function oT(id) {
      document.querySelectorAll('.tc').forEach(e => e.classList.remove('act'));
      document.querySelectorAll('.tb').forEach(e => e.classList.remove('act'));
      document.getElementById('tc'+id).classList.add('act');
      document.getElementById('tb'+id).classList.add('act');
    }

    function buildUI() {
      let dHtml = "";
      for(let i=0; i<10; i++) {
        dHtml += `<div class='card'><h4>${names[i]}</h4><button id='btn${i}' class='btn off-m' onclick='toggleRelay(${i})'>Wait</button></div>`;
      }
      document.getElementById('buttonsGrid').innerHTML = dHtml;

      let tHtml = "";
      for(let i=0; i<10; i++) {
        tHtml += `<button id='tb${i}' class='tb ${i==0?"act":""}' onclick='oT(${i})'>L${i+1}</button>`;
      }
      document.getElementById('settingsTabs').innerHTML = tHtml;

      let cHtml = "";
      for(let i=0; i<10; i++) {
        cHtml += `<div id='tc${i}' class='tc ${i==0?"act":""}'><h3 style='color:#f9d976;text-align:center;margin-top:0;text-transform:uppercase;'>${names[i]}</h3>`;
        for(let j=0; j<12; j++) {
          let p = `r${i}s${j}`;
          cHtml += `<div class='cd' style='border-left-color:${slotColors[j]}'><div class='hd' style='color:${slotColors[j]}'><span>${slotNames[j]}</span><label class='sw'><input type='checkbox' id='${p}_en'><span></span></label></div><div class='rw'><span>ON</span><div><input type='number' id='${p}_sh' min='1' max='12' value='12' style='width:35px'>:<input type='number' id='${p}_sm' min='0' max='59' value='0' style='width:35px'> <select id='${p}_sap'><option value='0'>AM</option><option value='1'>PM</option></select></div></div><div class='rw'><span>OFF</span><div><input type='number' id='${p}_eh' min='1' max='12' value='12' style='width:35px'>:<input type='number' id='${p}_em' min='0' max='59' value='0' style='width:35px'> <select id='${p}_eap'><option value='0'>AM</option><option value='1'>PM</option></select></div></div></div>`;
        }
        cHtml += `<button class='btn-save' onclick='saveFirebaseSettings(${i})'>SYNC L${i+1} WITH MASTER</button></div>`;
      }
      document.getElementById('settingsContent').innerHTML = cHtml;
    }

    function loadFirebaseSettings() {
      db.ref('/settings').once('value', (snapshot) => {
        let data = snapshot.val();
        if(!data) return;
        for(let i=0; i<10; i++) {
          if(data["R"+i]) {
            for(let j=0; j<12; j++) {
              let slot = data["R"+i]["S"+j];
              if(slot) {
                let p = `r${i}s${j}`;
                document.getElementById(`${p}_en`).checked = (slot.en == 1);
                
                let sh_12 = (slot.sh == 0 || slot.sh == 12) ? 12 : (slot.sh > 12 ? slot.sh - 12 : slot.sh);
                let sh_ap = (slot.sh >= 12) ? 1 : 0;
                document.getElementById(`${p}_sh`).value = sh_12;
                document.getElementById(`${p}_sm`).value = slot.sm;
                document.getElementById(`${p}_sap`).value = sh_ap;

                let eh_12 = (slot.eh == 0 || slot.eh == 12) ? 12 : (slot.eh > 12 ? slot.eh - 12 : slot.eh);
                let eh_ap = (slot.eh >= 12) ? 1 : 0;
                document.getElementById(`${p}_eh`).value = eh_12;
                document.getElementById(`${p}_em`).value = slot.em;
                document.getElementById(`${p}_eap`).value = eh_ap;
              }
            }
          }
        }
      });
    }

    function saveFirebaseSettings(relayId) {
      let relayData = {};
      for(let j=0; j<12; j++) {
        let p = `r${relayId}s${j}`;
        let en = document.getElementById(`${p}_en`).checked ? 1 : 0;
        
        let sh_in = parseInt(document.getElementById(`${p}_sh`).value);
        let sm = parseInt(document.getElementById(`${p}_sm`).value);
        let sap = parseInt(document.getElementById(`${p}_sap`).value);
        let sh = (sap === 1) ? (sh_in === 12 ? 12 : sh_in + 12) : (sh_in === 12 ? 0 : sh_in);

        let eh_in = parseInt(document.getElementById(`${p}_eh`).value);
        let em = parseInt(document.getElementById(`${p}_em`).value);
        let eap = parseInt(document.getElementById(`${p}_eap`).value);
        let eh = (eap === 1) ? (eh_in === 12 ? 12 : eh_in + 12) : (eh_in === 12 ? 0 : eh_in);

        relayData["S"+j] = { en: en, sh: sh, sm: sm, eh: eh, em: em };
      }

      db.ref('/settings/R' + relayId).set(relayData).then(() => {
        db.ref('/settings_updated').set(true); 
        
        let t = document.getElementById('toast');
        t.className = 'show';
        setTimeout(() => { t.className = ''; }, 3000);
      });
    }

    window.onload = () => {
      buildUI();
      loadFirebaseSettings();
      for(let i=0; i<10; i++) {
        db.ref('/relays/R' + i).on('value', (snapshot) => {
          let state = snapshot.val();
          if (state === null) state = false;
          relayStates["R"+i] = state;
          let btn = document.getElementById('btn' + i);
          if(btn) {
            btn.innerHTML = state ? "ON" : "OFF";
            btn.className = state ? "btn on-m" : "btn off-m";
          }
        });
      }
    };
  </script>
</body>
</html>
