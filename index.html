
<!DOCTYPE HTML>
<html>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no'>
  <meta name='theme-color' content='#2b1b0e'>
  <title>Sarvopari Dham Online</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body{font-family:'Segoe UI', sans-serif; background:radial-gradient(circle at center, #2b1b0e 0%, #0a0a0a 100%); color:#f0e6d2; margin:0; text-align:center; min-height:100vh; padding-bottom:70px;}
    .nav{background:rgba(20, 20, 20, 0.9); padding:10px; display:flex; justify-content:space-around; font-weight:bold; border-bottom: 2px solid #c8963e;}
    .nav a{color:#a9a9a9; text-decoration:none; padding:6px 15px; border-radius:20px; transition:0.3s; cursor:pointer;}
    .nav a.act{background:linear-gradient(145deg, #c8963e, #8b6914); color:#000;}
    
    h2{margin:20px 0 5px; color:#e6c27a; font-size:18px;}
    #clock{color:#50e3c2; font-weight:bold; font-size:16px; margin-bottom:15px;}
    #netStatus{font-size:12px; font-weight:bold; color:#ff4c4c; margin-bottom:10px;}
    
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; max-width:800px; margin:auto;}
    .card{background:linear-gradient(145deg, rgba(40,30,20,0.8), rgba(20,15,10,0.9)); padding:10px; border-radius:10px; border:1px solid rgba(200,150,62,0.3);}
    h4{margin:0 0 10px; color:#f9d976; font-size:12px;}
    .btn-row{display:flex; gap:8px;}
    .btn{border:none; padding:8px 0; border-radius:20px; flex:1; font-weight:bold; cursor:pointer; color:#fff; font-size:11px; transition:0.3s; box-shadow:0 3px 5px rgba(0,0,0,0.4);}
    
    .on-m{background:#388E3C; box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);}
    .off-m{background:#D32F2F;}
    .on-a{background:#0097A7; box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);}
    .off-a{background:#7B1FA2;}
    .a-on{background:#F57C00; box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);}
    .a-off{background:#1976D2;}
    
    .footer{color:#ffffff; font-size:18px; margin-top:30px; padding-bottom:30px; font-weight:bold; letter-spacing:1px; text-shadow: 0 0 8px #ff00ff, 0 0 15px #ff00ff;}
  </style>
</head>
<body>
  
  <div class='nav'>
    <a id="navDash" class='act' onclick="alert('Use Settings button below for Slots!')">DASHBOARD</a>
    <a id="navSet" onclick="alert('Online Settings are in development. Enjoy the Dashboard!')">SETTINGS</a>
  </div>
  
  <h2>🔴🙏 SARVOPARI DHAM 🙏🔴</h2>
  <div id='netStatus'>Connecting to Cloud... ⏳</div>
  <div id='clock'>Loading...</div>
  
  <div class='grid' id='buttonsGrid'></div>
  <div class='footer'>GLOBAL LIGHT REMOTE</div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAoPnrydmBiFCG8FP52Sy_jsRBb1CyUfaM",
      databaseURL: "https://sarvopari-liths-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const names = ["1. Jalar 1", "2. Jalar 2", "3. Jalar 3", "4. Zumar 1", "5. Zumar 2", "6. Zumar 3", "7. Ghumat", "8. Border", "9. Lamp 2", "10. Vakta Light"];
    
    let relayStates = {};
    let manualModes = {};

    function updateClock() {
      const now = new Date();
      const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      let h12 = now.getHours() % 12 || 12;
      let ampm = now.getHours() >= 12 ? "PM" : "AM";
      let m = now.getMinutes().toString().padStart(2, '0');
      let s = now.getSeconds().toString().padStart(2, '0');
      document.getElementById('clock').innerHTML = `${days[now.getDay()]} ${h12}:${m}:${s} ${ampm}`;
    }
    setInterval(updateClock, 1000);

    function toggleRelay(id) {
      let currentState = relayStates["R"+id] || false;
      db.ref('/relays/R' + id).set(!currentState);
      db.ref('/modes/R' + id).set(true); // મેન્યુઅલ દબાવ્યું એટલે મોડ મેન્યુઅલ થઈ જશે
    }

    function setAuto(id) {
      db.ref('/modes/R' + id).set(false); // ઓટો બટન દબાવ્યું 
    }

    function buildUI() {
      let html = "";
      for(let i=0; i<10; i++) {
        html += `<div class='card'><h4>${names[i]}</h4><div class='btn-row'>
                 <button id='btnR${i}' class='btn off-m' onclick='toggleRelay(${i})'>Wait</button>
                 <button id='btnA${i}' class='btn a-on' onclick='setAuto(${i})'>Wait</button>
                 </div></div>`;
      }
      document.getElementById('buttonsGrid').innerHTML = html;
    }

    window.onload = () => {
      buildUI();
      
      // Connection Status Check
      db.ref(".info/connected").on("value", function(snap) {
        let statusDiv = document.getElementById("netStatus");
        if (snap.val() === true) {
          statusDiv.innerHTML = "🟢 Online Connected";
          statusDiv.style.color = "#4CAF50";
        } else {
          statusDiv.innerHTML = "🔴 Disconnected";
          statusDiv.style.color = "#ff4c4c";
        }
      });

      // Listen to Database Realtime
      for(let i=0; i<10; i++) {
        db.ref('/relays/R' + i).on('value', (s) => {
          relayStates["R"+i] = s.val() || false; updateBtnUI(i);
        });
        db.ref('/modes/R' + i).on('value', (s) => {
          manualModes["R"+i] = (s.val() !== null) ? s.val() : true; updateBtnUI(i);
        });
      }
    };

    function updateBtnUI(i) {
      let b = document.getElementById(`btnR${i}`);
      let a = document.getElementById(`btnA${i}`);
      if(!b || !a) return;
      
      let isO = relayStates["R"+i];
      let isM = manualModes["R"+i];

      b.innerHTML = isO ? (isM ? "ON" : "ON (Auto)") : (isM ? "OFF" : "OFF (Auto)");
      b.className = isO ? (isM ? "btn on-m" : "btn on-a") : (isM ? "btn off-m" : "btn off-a");
      
      a.innerHTML = isM ? "AUTO" : "AUTO (ON)";
      a.className = isM ? "btn a-off" : "btn a-on";
    }
  </script>
</body>
</html>
